name: Build Toolchain Image

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'containers/toolchain.Dockerfile'
      - 'containers/triton_install.sh'
      - '.dockerignore'
      - 'VERSION'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rocm-version: ['7.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read VERSION file
        id: version
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push toolchain image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/toolchain.Dockerfile
          build-args: |
            ROCM_VERSION=${{ matrix.rocm-version }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omniprobe-toolchain:${{ steps.version.outputs.version }}-rocm${{ matrix.rocm-version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/omniprobe-toolchain:latest-rocm${{ matrix.rocm-version }}
          cache-from: type=gha,scope=toolchain-rocm${{ matrix.rocm-version }}
          cache-to: type=gha,mode=max,scope=toolchain-rocm${{ matrix.rocm-version }}

      - name: Image digest
        run: |
          echo "Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/omniprobe-toolchain:${{ steps.version.outputs.version }}-rocm${{ matrix.rocm-version }}"
          echo "Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/omniprobe-toolchain:latest-rocm${{ matrix.rocm-version }}"
